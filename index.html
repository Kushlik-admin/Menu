<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BURGER PRO DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; padding-bottom: 100px; }
        
        .promo { 
            background: #ff9800; color: white; padding: 12px; border-radius: 12px; 
            text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .card { 
            position: relative; height: 160px; border-radius: 18px; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center;
            background-size: cover; background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Затемнение для того, чтобы белый текст всегда был виден */
        .card::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.35); z-index: 1;
        }

        .card b { 
            position: relative; z-index: 2; color: white; 
            font-size: 0.9rem; text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            padding: 0 5px;
        }

        /* АППЕТИТНЫЕ ФОТО ДЛЯ ВСЕХ КАТЕГОРИЙ */
        #c-burger { background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500&auto=format&fit=crop'); }
        #c-guma { background-image: url('https://images.unsplash.com/photo-1628113310821-96a2ec693a12?q=80&w=500&auto=format&fit=crop'); }
        #c-grill { background-image: url('https://images.unsplash.com/photo-1626645272640-bf6137893960?q=80&w=500&auto=format&fit=crop'); }
        #c-somsa { background-image: url('https://images.unsplash.com/photo-1623341214825-9f4f963727da?q=80&w=500&auto=format&fit=crop'); }
        #c-tim { background-image: url('https://images.unsplash.com/photo-1619881590738-a1120076a5eb?q=80&w=500&auto=format&fit=crop'); }
        #c-milliy { background-image: url('https://images.unsplash.com/photo-1616070829624-88405ad4932a?q=80&w=500&auto=format&fit=crop'); }

        /* Внутреннее меню */
        .menu-page { display: none; background: white; border-radius: 20px 20px 0 0; padding: 15px; min-height: 90vh; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .i-info b { font-size: 1rem; color: #333; }
        .i-info span { color: #27ae60; font-weight: bold; }
        .add { background: #ff9800; color: white; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 1.5rem; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; border-top: 1px solid #ddd; }
        .btn-confirm { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
        .back { background: #eee; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main">
    <div class="promo">🎁 6-chi buyurtma yetkazib berish BEPUL!</div>
    <div class="grid">
        <div class="card" id="c-burger" onclick="openM('burger')"><b>BURGER PRO</b></div>
        <div class="card" id="c-guma" onclick="openM('guma')"><b>GUMA & PIRASHKI</b></div>
        <div class="card" id="c-grill" onclick="openM('grill')"><b>GRILL</b></div>
        <div class="card" id="c-somsa" onclick="openM('somsa')"><b>SOMSA / SHASHLIK</b></div>
        <div class="card" id="c-tim" onclick="openM('tim')"><b>TIM LAVASH</b></div>
        <div class="card" id="c-milliy" onclick="openM('milliy')"><b>MILLIY TAOMLAR</b></div>
    </div>
</div>

<div id="menu" class="menu-page">
    <button class="back" onclick="back()">⬅️ ORQAGA</button>
    <div id="content"></div>
</div>

<div class="footer" id="f">
    <button class="btn-confirm" id="confirm-text" onclick="send()">TASDIQLASH</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let cart = [];
    let total = 0;

    const data = {
        'burger': [{n:'Big Burger', p:45000}, {n:'Gamburger', p:35000}, {n:'Chizburger', p:40000}, {n:'Double Chizburger', p:55000}],
        'guma': [{n:'GUMA', p:5000}, {n:'CHEBUREK', p:8000}, {n:'KARTOSHKALI', p:4000}],
        'grill': [{n:'KOTA GRILL', p:60000}, {n:'GRILL 1 KG', p:100000}],
        'somsa': [{n:'QIYMA SOMSA', p:8000}, {n:'QOY JAZ SHASHLIK', p:16000}, {n:'QOY GOSHLI SOMSA', p:18000}],
        'tim': [{n:'LAVASH BIG', p:35000}, {n:'MEGA DONAR', p:42000}, {n:'XODOG SUPER', p:25000}],
        'milliy': [{n:'Palov', p:25000}, {n:'Manti', p:20000}]
    };

    function openM(id) {
        document.getElementById('main').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
        let div = document.getElementById('content');
        let html = `<h2 style="text-align:center; color:#333;">${id.toUpperCase()}</h2>`;
        data[id].forEach(i => {
            html += `<div class="item">
                <div class="i-info"><b>${i.n}</b><br><span>${i.p.toLocaleString()} so'm</span></div>
                <button class="add" onclick="add('${i.n}', ${i.p})">+</button>
            </div>`;
        });
        div.innerHTML = html;
        window.scrollTo(0,0);
    }

    function add(n, p) {
        cart.push({n, p});
        total += p;
        document.getElementById('f').style.display = 'block';
        document.getElementById('confirm-text').innerText = `SAVATCHA: ${total.toLocaleString()} so'm`;
        tg.HapticFeedback.impactOccurred('medium');
    }

    function back() {
        document.getElementById('main').style.display = 'block';
        document.getElementById('menu').style.display = 'none';
        document.getElementById('f').style.display = 'none';
        cart = []; total = 0;
    }

    function send() {
        if(cart.length > 0) {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }
    }
</script>
</body>
</html>
