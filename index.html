<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; padding: 10px; padding-bottom: 90px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { position: relative; background-size: cover; background-position: center; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: pointer; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid white; overflow: hidden; color: white; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); }
        .card b { position: relative; z-index: 1; text-transform: uppercase; font-size: 0.8rem; }
        .loc-btn { position: relative; z-index: 2; background: white; color: black; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; margin-top: 5px; font-weight: bold; }
        
        .menu-page { display: none; background: white; border-radius: 15px; padding: 15px; min-height: 70vh; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .item-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 1000; }
        .order-confirm { background: #2e7d32; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="main-page">
        <div class="main-grid">
            <div class="card" style="background-image: url('https://img.freepik.com/free-photo/delicious-burger-with-fresh-ingredients_23-2150857908.jpg')" onclick="showMenu('burger')">
                <b>BURGER PRO</b>
                <button class="loc-btn" onclick="event.stopPropagation(); window.open('https://www.google.com/maps?q=41.2995,69.2401')">📍 LOKATSIYA</button>
            </div>
            <div class="card" style="background-image: url('https://img.freepik.com/free-photo/side-view-doner-kebab-with-veggies-white-sauce-pita-slice-tomatoes-lettuce-on-wooden-board_141793-4712.jpg')" onclick="showMenu('tim')">
                <b>TIM LAVASH</b>
                <button class="loc-btn" onclick="event.stopPropagation(); window.open('https://www.google.com/maps?q=41.3,69.3')">📍 LOKATSIYA</button>
            </div>
            </div>
    </div>

    <div id="menu-page" class="menu-page">
        <button onclick="goBack()" style="width:100%; padding:12px; background:#eee; border:none; border-radius:10px;">🔙 ORQAGA</button>
        <div id="menu-content"></div>
    </div>

    <div class="footer" id="footer">
        <button class="order-confirm" id="order-btn" onclick="finishOrder()">TASDIQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = [];
        let total = 0;

        const imgBase = {
            'lavash': 'https://img.freepik.com/free-photo/side-view-doner-kebab-with-veggies-white-sauce-pita-slice-tomatoes-lettuce-on-wooden-board_141793-4712.jpg',
            'burger': 'https://img.freepik.com/free-photo/delicious-burger-with-fresh-ingredients_23-2150857908.jpg',
            'shashlik': 'https://img.freepik.com/free-photo/oriental-shish-kebab-with-vegetables_140725-3843.jpg',
            'somsa': 'https://img.freepik.com/free-photo/traditional-oriental-meat-pastries-samosa_114579-2720.jpg',
            'default': 'https://img.freepik.com/free-vector/vector-flat-food-icon_1284-43015.jpg'
        };

        function getImg(name) {
            let n = name.toLowerCase();
            if(n.includes('lavash')) return imgBase.lavash;
            if(n.includes('burger')) return imgBase.burger;
            if(n.includes('shashlik')) return imgBase.shashlik;
            if(n.includes('somsa')) return imgBase.somsa;
            return imgBase.default;
        }

        const data = {
            'burger': [{n:'Lavash Big', p:40000}, {n:'Big Burger', p:45000}],
            'somsa': [{n:'Akaxon Somsa', p:8000}, {n:'Qiyma Shashlik', p:15000}]
        };

        function showMenu(id) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            let html = `<h2>${id.toUpperCase()}</h2>`;
            data[id].forEach(item => {
                html += `<div class="item-row">
                    <div class="item-info">
                        <img src="${getImg(item.n)}" class="item-img">
                        <b>${item.n}<br><small>${item.p} sum</small></b>
                    </div>
                    <button onclick="add('${item.n}',${item.p})" style="background:#ffc107; border:none; padding:8px 15px; border-radius:8px;">+</button>
                </div>`;
            });
            document.getElementById('menu-content').innerHTML = html;
        }

        function add(n, p) {
            cart.push({name: n, price: p});
            total += p;
            document.getElementById('footer').style.display = 'block';
            document.getElementById('order-btn').innerText = `TASDIQLASH: ${total.toLocaleString()} so'm`;
        }

        function goBack() {
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('menu-page').style.display = 'none';
        }

        function finishOrder() {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }
    </script>
</body>
</html>
