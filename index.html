<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; padding: 10px; padding-bottom: 90px; }
        
        .promo-banner { 
            background: linear-gradient(135deg, #ffc107, #ff9800); 
            color: black; padding: 12px; border-radius: 12px; 
            text-align: center; margin-bottom: 15px; font-weight: bold; 
            border: 2px dashed #d35400; 
        }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .card {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            height: 115px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            overflow: hidden; 
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45); /* Затемнение для читаемости текста */
        }

        .card b {
            position: relative;
            z-index: 1;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 800;
        }

        /* --- ССЫЛКИ НА НОВЫЕ ФОТО --- */
        #card-burger { background-image: url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400'); }
        #card-guma { background-image: url('https://img.freepik.com/free-photo/uzbek-food-dumplings_144627-11105.jpg?w=400'); }
        #card-grill { background-image: url('https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400'); }
        
        /* 2. Обновленная Самса */
        #card-somsa { background-image: url('https://img.freepik.com/free-photo/traditional-oriental-meat-pastries-samosa_114579-2720.jpg?w=400'); }
        
        /* 1. Аппетитный Лаваш */
        #card-tim { background-image: url('https://img.freepik.com/free-photo/side-view-doner-kebab-with-veggies-white-sauce-pita-slice-tomatoes-lettuce-on-wooden-board_141793-4712.jpg?w=400'); }
        
        /* 5. Национальные блюда (Плов/Шурпа) */
        #card-milliy { background-image: url('https://img.freepik.com/free-photo/oriental-shish-kebab-with-vegetables_140725-3843.jpg?w=400'); }
        
        /* 3. Фото для Аптеки */
        #card-dorxona { background-image: url('https://images.unsplash.com/photo-1587854680352-936b22b91030?w=400'); }
        
        /* 4. Фото для Маркета */
        #card-market { background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'); }

        .card:active { transform: scale(0.95); }

        .menu-page { display: none; background: white; border-radius: 15px; padding: 15px; min-height: 70vh; }
        .food-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .add-btn { background: #ffc107; border: none; width: 40px; height: 40px; border-radius: 10px; font-weight: bold; font-size: 20px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .order-confirm { background: #2e7d32; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="main-page">
        <div class="promo-banner">🎁 AKSIYA: 6-chi buyurtma yetkazib berish BEPUL!</div>
        <div class="main-grid">
            <div class="card" id="card-burger" onclick="showMenu('burger')"><b>BURGER PRO</b></div>
            <div class="card" id="card-guma" onclick="showMenu('guna')"><b>GUMA & PIRASHKI</b></div>
            <div class="card" id="card-grill" onclick="showMenu('grill')"><b>GRILL</b></div>
            <div class="card" id="card-somsa" onclick="showMenu('somsa')"><b>AKAXON SOMSA</b></div>
            <div class="card" id="card-tim" onclick="showMenu('tim')"><b>TIM LAVASH</b></div>
            <div class="card" id="card-milliy" onclick="showMenu('milliy')"><b>MILLIY TAOMLAR</b></div>
            <div class="card" id="card-dorxona" onclick="showMenu('dorxona')"><b>DORXONA</b></div>
            <div class="card" id="card-market" onclick="showMenu('market')"><b>KUCHLIK MARKET</b></div>
        </div>
    </div>

    <div id="menu-page" class="menu-page">
        <button onclick="goBack()" style="padding:10px; width:100%; margin-bottom:15px; border-radius:10px; border:none; background:#eee;">🔙 Orqaga</button>
        <div id="menu-content"></div>
    </div>

    <div class="footer" id="footer">
        <button class="order-confirm" onclick="finishOrder()">TASDIQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let totalPrice = 0;

        const data = {
            'burger': [{n: 'Big Burger', p: 45000}, {n: 'Gamburger', p: 35000}, {n: 'Chizburger', p: 40000}],
            'guna': [{n: 'GUMA', p: 5000}, {n: 'PIRASHKI', p: 5000}],
            'grill': [{n: 'KOTA GRILL', p: 65000}, {n: 'YARIM GRILL', p: 35000}],
            'somsa': [{n: 'AKAXON SOMSA (Go\'shtli)', p: 8000}, {n: 'Qovoqli Somsa', p: 5000}],
            'tim': [{n: 'TIM LAVASH (Mol)', p: 35000}, {n: 'TIM LAVASH (Tovuq)', p: 33000}],
            'milliy': [{n: 'Osh (Palov)', p: 25000}, {n: 'Sho\'rva', p: 20000}],
            'dorxona': [{n: 'Paratsetamol', p: 5000}, {n: 'Sitramon', p: 4000}],
            'market': [{n: 'Pepsi 1.5L', p: 13000}, {n: 'Non', p: 3000}]
        };

        function showMenu(id) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            let container = document.getElementById('menu-content');
            let html = `<h2>${id.toUpperCase()}</h2>`;
            data[id].forEach(item => {
                html += `
                    <div class="food-item">
                        <div><b>${item.n}</b><br>${item.p.toLocaleString()} so'm</div>
                        <button class="add-btn" onclick="add('${item.n}', ${item.p})">+</button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function add(name, price) {
            cart.push({name: name, price: price});
            totalPrice += price;
            document.getElementById('footer').style.display = 'block';
            document.querySelector('.order-confirm').innerText = `TASDIQLASH: ${totalPrice.toLocaleString()} so'm`;
        }

        function goBack() {
            document.getElementById('main-page').style.display = 'grid';
            document.getElementById('menu-page').style.display = 'none';
        }

        function finishOrder() {
            if (cart.length > 0) {
                tg.sendData(JSON.stringify({selected_res: 'order', cart: cart}));
                tg.close();
            }
        }
    </script>
</body>
</html>
