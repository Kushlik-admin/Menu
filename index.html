<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; padding-bottom: 100px; }
        
        .promo { 
            background: linear-gradient(135deg, #ff9800, #f39c12); color: white; 
            padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 15px;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* КАРТОЧКИ С ФОТО */
        .card { 
            position: relative; height: 140px; border-radius: 20px; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center;
            background-size: cover; background-position: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 2px solid white;
        }

        /* Затемнение для читаемости текста */
        .card::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        .card b { 
            position: relative; z-index: 2; color: white; 
            font-size: 1rem; text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }

        /* ФОТОГРАФИИ ДЛЯ ГЛАВНЫХ КНОПОК */
        #c-burger { background-image: url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=500'); }
        #c-guma { background-image: url('https://img.freepik.com/free-photo/delicious-fried-meat-pies-tasty-chebureks_144627-25145.jpg?w=500'); }
        #c-grill { background-image: url('https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?q=80&w=500'); }
        #c-somsa { background-image: url('https://images.unsplash.com/photo-1603362115995-95021f70eebe?q=80&w=500'); }
        #c-tim { background-image: url('https://images.unsplash.com/photo-1626700051175-656fc7bc30cc?q=80&w=500'); }
        #c-milliy { background-image: url('https://images.unsplash.com/photo-1626509653299-4ee43087d677?q=80&w=500'); filter: grayscale(1); }

        /* Стили страницы меню */
        .menu-page { display: none; background: white; border-radius: 25px 25px 0 0; padding: 20px; min-height: 85vh; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .i-img { width: 60px; height: 60px; border-radius: 12px; margin-right: 12px; background-size: cover; background-position: center; background-color: #f8f8f8; }
        .add { background: #ff9800; color: white; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 1.5rem; cursor: pointer; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 999; }
        .btn-confirm { background: #27ae60; color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="main">
    <div class="promo">🎁 6-chi buyurtma yetkazib berish BEPUL!</div>
    <div class="grid">
        <div class="card" id="c-burger" onclick="openM('burger')"><b>BURGER PRO</b></div>
        <div class="card" id="c-guma" onclick="openM('guma')"><b>GUMA & PIRASHKI</b></div>
        <div class="card" id="c-grill" onclick="openM('grill')"><b>GRILL</b></div>
        <div class="card" id="c-somsa" onclick="openM('somsa')"><b>SOMSA / SHASHLIK</b></div>
        <div class="card" id="c-tim" onclick="openM('tim')"><b>TIM LAVASH</b></div>
        <div class="card" id="c-milliy" onclick="alert('1-apreldan ochiladi!')"><b>MILLIY TAOMLAR</b></div>
    </div>
</div>

<div id="menu" class="menu-page">
    <button onclick="back()" style="width:100%; padding:12px; margin-bottom:20px; border-radius:12px; border:none; background:#eee; font-weight:bold;">⬅️ ORQAGA</button>
    <div id="content"></div>
</div>

<div class="footer" id="f">
    <button class="btn-confirm" id="confirm-text" onclick="send()">TASDIQLASH</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let cart = [];
    let total = 0;

    // Фото для товаров внутри меню (подобрал самые аппетитные)
    const foodPics = {
        'Big Burger': 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100',
        'GUMA': 'https://img.freepik.com/free-photo/delicious-fried-meat-pies-tasty-chebureks_144627-25145.jpg?w=100',
        'KOTA GRILL': 'https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=100',
        'QIYMA': 'https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=100',
        'LAVASH BIG': 'https://images.unsplash.com/photo-1626700051175-656fc7bc30cc?w=100'
    };

    const data = {
        'burger': [{n:'Big Burger', p:45000}, {n:'Chizburger', p:40000}, {n:'Lavash Big (Mol)', p:48000}, {n:'Fri', p:15000}],
        'guma': [{n:'GUMA', p:5000}, {n:'CHEBUREK', p:8000}, {n:'KARTOSHKALI', p:4000}],
        'grill': [{n:'KOTA GRILL', p:60000}, {n:'KFS 1 KG', p:100000}],
        'somsa': [{n:'QIYMA', p:8000}, {n:'QÕY JAZ', p:16000}, {n:'QÕY GOSHLI', p:18000}],
        'tim': [{n:'LAVASH BIG', p:35000}, {n:'MEGA DONAR', p:42000}, {n:'Xodog super', p:25000}]
    };

    function openM(id) {
        document.getElementById('main').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
        let div = document.getElementById('content');
        let html = `<h2 style="text-align:center">${id.toUpperCase()}</h2>`;
        data[id].forEach(i => {
            let p = foodPics[i.n] || 'https://via.placeholder.com/60?text=Food';
            html += `<div class="item">
                <div style="display:flex; align-items:center;">
                    <div class="i-img" style="background-image:url('${p}')"></div>
                    <div><b>${i.n}</b><br><span style="color:#27ae60;font-weight:bold;">${i.p.toLocaleString()} so'm</span></div>
                </div>
                <button class="add" onclick="add('${i.n}', ${i.p})">+</button>
            </div>`;
        });
        div.innerHTML = html;
        window.scrollTo(0,0);
    }

    function add(n, p) {
        cart.push({n, p});
        total += p;
        document.getElementById('f').style.display = 'block';
        document.getElementById('confirm-text').innerText = `TASDIQLASH: ${total.toLocaleString()} so'm`;
        tg.HapticFeedback.impactOccurred('medium');
    }

    function back() {
        document.getElementById('main').style.display = 'block';
        document.getElementById('menu').style.display = 'none';
        document.getElementById('f').style.display = 'none';
        cart = []; total = 0;
    }

    function send() {
        if(cart.length > 0) {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }
    }
</script>
</body>
</html>
