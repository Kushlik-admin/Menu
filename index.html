<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; padding-bottom: 180px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold; border: 2px solid #eee; }
        .menu-page { display: none; background: white; border-radius: 20px; padding: 15px; min-height: 80vh; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .cat-h { background: #f8f9fa; padding: 5px 10px; font-weight: bold; font-size: 0.75rem; margin-top: 10px; color: #555; border-left: 4px solid #ffc107; }
        .cart-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 2px solid #ddd; display: none; z-index: 1000; }
        .btn-green { width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 8px; }
        .btn-orange { width: 100%; background: #ff9f43; color: white; border: none; padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="main-grid" class="grid">
        <div class="card" onclick="openMenu('tim')">TIM LAVASH</div>
        <div class="card" onclick="openMenu('burger')">BURGER PRO</div>
        <div class="card" onclick="openMenu('somsa')">AKAHON SOMSA</div>
        <div class="card" onclick="openMenu('guma')">GUMA & PIRASHKI</div>
        <div class="card" onclick="openMenu('grill')">GRILL</div>
    </div>

    <div id="menu-view" class="menu-page">
        <button onclick="goBack()" style="width:100%; padding:10px; margin-bottom:10px;">⬅ ORQAGA</button>
        <div id="content"></div>
    </div>

    <div class="cart-footer" id="cart-ui">
        <div id="total-price" style="margin-bottom:10px; font-weight:bold; font-size:1.1rem;"></div>
        <button class="btn-green" onclick="sendOrder()">OFORMLENIYA ZAKAZ</button>
        <button class="btn-orange" onclick="clearCart()">KORZINANI TOZALASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = []; let total = 0;
        const db = {
            'tim': { id: "6945087548", items: [
                {c:'LAVASH', n:'BIG', p:35000}, {c:'LAVASH', n:'MINI', p:30000}, {c:'DANAR', n:'MEGA', p:42000},
                {c:'ICHIMLIK', n:'PEPSI 1.5L', p:17000}, {c:'ICHIMLIK', n:'18+', p:14000}, {c:'ICHIMLIK', n:'Garila', p:14000}
            ]},
            'burger': { id: "8626123558", items: [
                {c:'BURGER', n:'Big Burger', p:45000}, {c:'BURGER', n:'Gamburger', p:40000}, {c:'LAVASH', n:'Super Lavash', p:55000},
                {c:'ICHIMLIK', n:'Choy', p:0}, {c:'ICHIMLIK', n:'Kofe (3v1)', p:8000}
            ]},
            'grill': { id: "8626123558", items: [
                {n:'KOTA GRILL', p:60000}, {n:'KFS (1kg)', p:100000, type:'w'}
            ]},
            'somsa': { id: "8474161465", items: [
                {n:'QIYMA SHASHLIK', p:8000}, {n:'QOY GOSHLI SOMSA', p:18000}
            ]},
            'guma': { id: "8626123558", items: [
                {n:'KARTOSHKALI', p:4000}, {n:'CHEBUREK', p:8000}
            ]}
        };

        function openMenu(key) {
            document.getElementById('main-grid').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
            let html = `<h2>${key.toUpperCase()}</h2>`; let cat = "";
            db[key].items.forEach(i => {
                if(i.c && i.c !== cat) { html += `<div class="cat-h">${i.c}</div>`; cat = i.c; }
                html += `<div class="item-row"><span>${i.n}<br><b>${i.p}</b></span>
                <button onclick="add('${i.n}',${i.p},'${key}')" style="padding:10px 15px; background:#28a745; color:white; border:none; border-radius:8px;">+</button></div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        function add(n, p, r) {
            cart.push({n, p, r: r, cook: db[r].id}); total += p;
            document.getElementById('cart-ui').style.display = 'block';
            document.getElementById('total-price').innerText = `JAMI: ${total.toLocaleString()} SUM`;
        }

        function clearCart() { cart = []; total = 0; document.getElementById('cart-ui').style.display = 'none'; }
        function goBack() { document.getElementById('main-grid').style.display = 'grid'; document.getElementById('menu-view').style.display = 'none'; }
        function sendOrder() { tg.sendData(JSON.stringify({cart, total})); tg.close(); }
    </script>
</body>
</html>
