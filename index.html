<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; padding-bottom: 100px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { position: relative; height: 120px; border-radius: 15px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; overflow: hidden; border: 2px solid #fff; }
        .card::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
        .card b { position: relative; z-index: 1; text-align: center; font-size: 0.8rem; text-transform: uppercase; }
        
        .menu-page { display: none; background: white; border-radius: 20px; padding: 15px; min-height: 80vh; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 10px; }
        .cat-header { background: #ffc107; padding: 5px 10px; margin-top: 15px; font-weight: bold; font-size: 0.8rem; border-radius: 5px; }
        
        .footer { position: fixed; bottom: 0; left:0; right:0; background: white; padding: 15px; display: none; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
        .btn-group { display: flex; gap: 10px; }
        .btn-add-more { flex: 1; background: #ff9800; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; }
        .btn-confirm { flex: 1; background: #2e7d32; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; }
        
        .weight-box { display: flex; align-items: center; gap: 10px; }
        .w-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="main-page">
        <div class="main-grid">
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400')" onclick="showMenu('burger')"><b>BURGER PRO</b></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1633383718081-22ac93e3dbf1?w=400')" onclick="showMenu('tim')"><b>TIM LAVASH</b></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=400')" onclick="showMenu('grill')"><b>GRILL & KFS</b></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1603532648955-0393e01c8a64?w=400')" onclick="showMenu('somsa')"><b>AKAHON SOMSA</b></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1541544741938-0af808871cc0?w=400')" onclick="showMenu('guna')"><b>GUMA & PIRASHKI</b></div>
            <div class="card" style="background-color: #d32f2f;" onclick="showMenu('dorxona')"><b>DORXONA 🏥</b></div>
            <div class="card" style="background-color: #455a64;" onclick="showMenu('moto')"><b>MOTO USTA 👨‍🔧</b></div>
        </div>
    </div>

    <div id="menu-page" class="menu-page">
        <button onclick="goBack()" style="width:100%; padding:10px; border:none; background:#eee; border-radius:10px; margin-bottom:10px;">🔙 ORQAGA</button>
        <div id="menu-content"></div>
    </div>

    <div class="footer" id="footer">
        <div class="btn-group">
            <button class="btn-add-more" onclick="goBack()">➕ YANA QO'SHISH</button>
            <button class="btn-confirm" id="order-btn" onclick="finishOrder()">RASMIYLASHTIRISH</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = [];
        let total = 0;
        let tempWeights = {};

        // База данных меню
        const data = {
            'somsa': {
                id: "8474161465", loc: "41.003998, 69.235951", items: [
                {c:'SHASHLIK', n:'Qiyma', p:8000}, {c:'SHASHLIK', n:'Tovq', p:8000}, {c:'SHASHLIK', n:'Jigar', p:8000},
                {c:'SHASHLIK', n:'Baliq', p:10000}, {c:'SHASHLIK', n:'Mol Jaz', p:15000}, {c:'SHASHLIK', n:'Qoy Jaz', p:16000},
                {c:'SOMSA', n:'Qoy Goshli', p:18000}, {c:'SOMSA', n:'Mol Goshli', p:13000}, {c:'SOMSA', n:'Tovuq Goshli', p:8000}, {c:'SOMSA', n:'Kartoshkali', p:5000}
            ]},
            'tim': {
                id: "6945087548", loc: "41.002555, 69.233649", items: [
                {c:'LAVASH', n:'Big', p:35000}, {c:'LAVASH', n:'Mini', p:30000}, {c:'LAVASH', n:'Sir', p:37000},
                {c:'DANAR', n:'Big', p:32000}, {c:'DANAR', n:'Mega', p:42000},
                {c:'ICHIMLIK', n:'Pepsi 1.5L', p:17000}, {c:'ICHIMLIK', n:'Sok 1L', p:15000}
            ]},
            'burger': {
                id: "6680569613", loc: "0,0", items: [
                {c:'LAVASH', n:'Lavash Big', p:40000}, {c:'BURGER', n:'Big Burger', p:45000},
                {c:'DONAR', n:'Donar Box', p:56000}, {c:'ZAKUSKI', n:'Strips (7 ta)', p:34000}
            ]},
            'grill': {
                id: "8626123558", loc: "0,0", items: [
                {n:'Kota Grill', p:60000}, {n:'Ortancha Grill', p:55000},
                {n:'KFS', p:100000, type:'weight', min:300}
            ]}
        };

        function showMenu(key) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            let html = `<h3>${key.toUpperCase()}</h3>`;
            
            if(key === 'dorxona') {
                html += `<p>MUROJAT UCHUN: <b>+998909299461</b></p><button onclick="sendCall('DORXONA')">📞 BOG'LANISH</button>`;
            } else if(key === 'moto') {
                html += `<p>Xizmatlar: Moy almashtirish, Elektrika, Motor.</p><button onclick="sendLoc('41.017336, 69.232820')">📍 MANZILNI KO'RISH</button>`;
            } else {
                let curCat = "";
                data[key].items.forEach((item, i) => {
                    if(item.c && item.c !== curCat) { html += `<div class="cat-header">${item.c}</div>`; curCat = item.c; }
                    html += `<div class="item-row">
                        <div style="display:flex; align-items:center;">
                            <img src="https://via.placeholder.com/60" class="item-img">
                            <div><b>${item.n}</b><br>${item.p} sum</div>
                        </div>`;
                    if(item.type === 'weight') {
                        let w = tempWeights[item.n] || 300;
                        html += `<div class="weight-box">
                            <button class="w-btn" onclick="changeW('${item.n}',-100)">-</button>
                            <span>${w}g</span>
                            <button class="w-btn" onclick="changeW('${item.n}',100)">+</button>
                            <button onclick="addToCart('${item.n}',${item.p},'${key}',${w})">OK</button>
                        </div>`;
                    } else {
                        html += `<button onclick="addToCart('${item.n}',${item.p},'${key}')">+</button>`;
                    }
                    html += `</div>`;
                });
            }
            document.getElementById('menu-content').innerHTML = html;
        }

        function changeW(name, val) {
            tempWeights[name] = (tempWeights[name] || 300) + val;
            if(tempWeights[name] < 300) tempWeights[name] = 300;
            showMenu('grill');
        }

        function addToCart(n, p, res, w=null) {
            let price = w ? (p * w / 1000) : p;
            cart.push({name: n, price: price, restaurant: res, cook_id: data[res].id, loc: data[res].loc});
            total += price;
            document.getElementById('footer').style.display = 'block';
            document.getElementById('order-btn').innerText = `TASDIQLASH: ${total} sum`;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function goBack() {
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('menu-page').style.display = 'none';
        }

        function finishOrder() {
            tg.sendData(JSON.stringify({type: "order", items: cart, total: total}));
            tg.close();
        }
    </script>
</body>
</html>
