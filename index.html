<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; padding: 10px; padding-bottom: 90px; }
        .promo-banner { background: linear-gradient(135deg, #ffc107, #ff9800); color: black; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 2px dashed #d35400; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { position: relative; background-size: cover; background-position: center; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: pointer; height: 115px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid white; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); }
        .card b { position: relative; z-index: 1; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); text-transform: uppercase; font-size: 0.85rem; font-weight: 800; }
        
        #card-burger { background-image: url('https://img.freepik.com/free-photo/delicious-burger-with-fresh-ingredients_23-2150857908.jpg'); }
        #card-guma { background-image: url('https://img.freepik.com/free-photo/uzbek-food-dumplings_144627-11105.jpg'); }
        #card-grill { background-image: url('https://img.freepik.com/free-photo/grilled-chicken-legs-with-vegetables_23-2148189814.jpg'); }
        #card-somsa { background-image: url('https://img.freepik.com/free-photo/eastern-food-patties-with-meat-nuts_23-2148128131.jpg'); }
        #card-tim { background-image: url('https://img.freepik.com/free-photo/shawarma-with-meat-vegetables_144627-30372.jpg'); }
        #card-milliy { background-image: url('https://img.freepik.com/free-photo/pilaf-with-meat-carrots_23-2148332148.jpg'); }

        .menu-page { display: none; background: white; border-radius: 15px; padding: 15px; min-height: 70vh; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .section-title { background: #f8f8f8; padding: 5px 10px; font-size: 0.8rem; font-weight: bold; color: #555; margin-top: 10px; }
        .weight-controls { display: flex; align-items: center; gap: 8px; }
        .btn-ctrl { background: #ffc107; border: none; width: 28px; height: 28px; border-radius: 5px; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 100; }
        .order-confirm { background: #2e7d32; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="main-page">
        <div class="promo-banner">🎁 AKSIYA: 6-chi buyurtma bepul!</div>
        <div class="main-grid">
            <div class="card" id="card-burger" onclick="showMenu('burger')"><b>BURGER PRO</b></div>
            <div class="card" id="card-guma" onclick="showMenu('guna')"><b>GUMA & PIRASHKI</b></div>
            <div class="card" id="card-grill" onclick="showMenu('grill')"><b>GRILL</b></div>
            <div class="card" id="card-somsa" onclick="showMenu('somsa')"><b>AKAHON SOMSA</b></div>
            <div class="card" id="card-tim" onclick="showMenu('tim')"><b>TIM LAVASH</b></div>
            <div class="card" id="card-milliy" onclick="showMenu('milliy')"><b>MILLIY TAOMLAR</b></div>
            <div class="card" onclick="sendCallRequest('DORXONA')"><b>DORXONA</b></div>
            <div class="card" onclick="sendCallRequest('KUCHLIK MARKET')"><b>KUCHLIK MARKET</b></div>
        </div>
    </div>

    <div id="menu-page" class="menu-page">
        <button onclick="goBack()" style="width:100%; padding:10px; border-radius:10px; border:none; background:#eee; margin-bottom:10px;">🔙 Orqaga</button>
        <div id="menu-content"></div>
    </div>

    <div class="footer" id="footer">
        <button class="order-confirm" id="order-btn" onclick="finishOrder()">TASDIQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let total = 0;
        let tempWeights = {};

        const data = {
            'burger': [
                {cat: 'LAVASH', n: 'Lavash Big', p: 40000}, {cat: 'LAVASH', n: 'Lavash Mini', p: 35000},
                {cat: 'LAVASH', n: 'Lavash Big (pishloqli)', p: 45000}, {cat: 'LAVASH', n: 'Super Lavash', p: 55000},
                {cat: 'BURGER', n: 'Big Burger', p: 45000}, {cat: 'BURGER', n: 'Gamburger', p: 40000},
                {cat: 'XOD-DOG', n: 'Hot-Dog Qazi', p: 42000}, {cat: 'XOD-DOG', n: 'Assorti', p: 33000},
                {cat: 'ICHIMLIK', n: 'Pepsi 1.5L', p: 15000}, {cat: 'ICHIMLIK', n: 'Sok 1L', p: 14000}
            ],
            'guna': [
                {n: 'Kartoshkali', p: 4000}, {n: 'Go\'shtli', p: 5000}, {n: 'Guma', p: 5000},
                {n: 'Sasiskali', p: 5000}, {n: 'Cheburek', p: 8000}, {n: 'Sirli', p: 5000}, {n: 'Karomli', p: 4000}
            ],
            'grill': [
                {n: 'KOTA GRILL', p: 60000, t: 'p'}, {n: 'ORTANCHA GRILL', p: 55000, t: 'p'},
                {n: 'KICHKINA GRILL', p: 50000, t: 'p'},
                {n: 'KFS (1kg=100k)', p: 100000, t: 'w', min: 300, step: 100}
            ],
            'somsa': [
                {cat: 'SHASHLIK', n: 'QIYMA', p: 8000}, {cat: 'SHASHLIK', n: 'TOVQ', p: 8000},
                {cat: 'SHASHLIK', n: 'BALIQ', p: 10000}, {cat: 'SHASHLIK', n: 'QÕY JAZ', p: 16000},
                {cat: 'SOMSA', n: 'QÕY GOSHLI', p: 18000}, {cat: 'SOMSA', n: 'MOL GOSHLI', p: 13000},
                {cat: 'SOMSA', n: 'KARTOSHKALI', p: 5000}
            ],
            'tim': [
                {cat: 'LAVASH', n: 'BIG', p: 35000}, {cat: 'LAVASH', n: 'SIR', p: 37000},
                {cat: 'DANAR', n: 'MEGA', p: 42000}, {cat: 'TIM', n: 'Klab Sendvich', p: 48000},
                {cat: 'ICHIMLIK', n: 'Gorilla', p: 14000}, {cat: 'ICHIMLIK', n: 'Flesh', p: 13000}
            ],
            'milliy': [ {n: 'Osh pors', p: 25000}, {n: 'Manti (dona)', p: 6000} ]
        };

        function sendCallRequest(target) {
            tg.sendData(JSON.stringify({action: "call", target: target}));
            tg.close();
        }

        function showMenu(id) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            let html = `<h2 style="text-align:center;">${id.toUpperCase()}</h2>`;
            let lastCat = "";
            
            data[id].forEach((item, idx) => {
                if (item.cat && item.cat !== lastCat) {
                    html += `<div class="section-title">${item.cat}</div>`;
                    lastCat = item.cat;
                }
                
                if (item.t === 'w') {
                    let w = tempWeights[item.n] || item.min;
                    tempWeights[item.n] = w;
                    html += `
                        <div class="item-row">
                            <div><b>${item.n}</b><br><small id="p-${idx}">${(item.p * w / 1000).toLocaleString()} so'm</small></div>
                            <div class="weight-controls">
                                <button class="btn-ctrl" onclick="chW('${id}',${idx},-1)">-</button>
                                <b id="w-${idx}">${w}g</b>
                                <button class="btn-ctrl" onclick="chW('${id}',${idx},1)">+</button>
                                <button onclick="addW('${id}',${idx})" style="background:#4CAF50; color:white; border:none; padding:8px; border-radius:5px;">OK</button>
                            </div>
                        </div>`;
                } else {
                    html += `
                        <div class="item-row">
                            <div><b>${item.n}</b><br><small>${item.p.toLocaleString()} so'm</small></div>
                            <button onclick="add('${item.n}', ${item.p})" style="background:#ffc107; border:none; padding:8px 18px; border-radius:8px; font-weight:bold;">+</button>
                        </div>`;
                }
            });
            document.getElementById('menu-content').innerHTML = html;
        }

        function chW(rId, idx, dir) {
            let item = data[rId][idx];
            let next = tempWeights[item.n] + (dir * item.step);
            if (next >= item.min) {
                tempWeights[item.n] = next;
                document.getElementById(`w-${idx}`).innerText = next + 'g';
                document.getElementById(`p-${idx}`).innerText = (item.p * next / 1000).toLocaleString() + " so'm";
            }
        }

        function addW(rId, idx) {
            let item = data[rId][idx];
            add(`${item.n} (${tempWeights[item.n]}g)`, (item.p * tempWeights[item.n] / 1000));
        }

        function add(n, p) {
            cart.push({name: n, price: p});
            total += p;
            document.getElementById('footer').style.display = 'block';
            document.getElementById('order-btn').innerText = `TASDIQLASH: ${total.toLocaleString()} so'm`;
            tg.HapticFeedback.impactOccurred('light');
        }

        function goBack() {
            document.getElementById('main-page').style.display = 'grid';
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            cart = []; total = 0;
        }

        function finishOrder() {
            if (cart.length > 0) { tg.sendData(JSON.stringify(cart)); tg.close(); }
        }
    </script>
</body>
</html>
