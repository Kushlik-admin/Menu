<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUSHLIK DELIVERY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f2f2f2; margin: 0; padding: 10px; padding-bottom: 90px; }
        .promo-banner { background: linear-gradient(135deg, #ffc107, #ff9800); color: black; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 2px dashed #d35400; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { position: relative; background-size: cover; background-position: center; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: pointer; height: 115px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid white; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); }
        .card b { position: relative; z-index: 1; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); text-transform: uppercase; font-size: 0.85rem; font-weight: 800; }
        
        /* Главные фото */
        #card-burger { background-image: url('https://img.freepik.com/free-photo/delicious-burger-with-fresh-ingredients_23-2150857908.jpg'); }
        #card-guma { background-image: url('https://img.freepik.com/free-photo/uzbek-food-dumplings_144627-11105.jpg'); }
        #card-grill { background-image: url('https://img.freepik.com/free-photo/grilled-chicken-legs-with-vegetables_23-2148189814.jpg'); }
        #card-somsa { background-image: url('https://img.freepik.com/free-photo/traditional-oriental-meat-pastries-samosa_114579-2720.jpg'); }
        #card-tim { background-image: url('https://img.freepik.com/free-photo/side-view-doner-kebab-with-veggies-white-sauce-pita-slice-tomatoes-lettuce-on-wooden-board_141793-4712.jpg'); }
        #card-milliy { background-image: url('https://img.freepik.com/free-photo/oriental-shish-kebab-with-vegetables_140725-3843.jpg'); }
        #card-dorxona { background-image: url('https://images.unsplash.com/photo-1587854680352-936b22b91030?w=400'); }
        #card-market { background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'); }

        .menu-page { display: none; background: white; border-radius: 15px; padding: 15px; min-height: 70vh; }
        .cat-header { background: #f8f9fa; padding: 10px; margin: 15px 0 5px 0; font-weight: bold; border-left: 4px solid #ffc107; color: #333; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: none; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .order-confirm { background: #2e7d32; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="main-page">
        <div class="promo-banner">🎁 AKSIYA: 6-chi buyurtma bepul!</div>
        <div class="main-grid">
            <div class="card" id="card-burger" onclick="showMenu('burger')"><b>BURGER PRO</b></div>
            <div class="card" id="card-guma" onclick="showMenu('guna')"><b>GUMA & PIRASHKI</b></div>
            <div class="card" id="card-grill" onclick="showMenu('grill')"><b>GRILL</b></div>
            <div class="card" id="card-somsa" onclick="showMenu('somsa')"><b>AKAHON SOMSA</b></div>
            <div class="card" id="card-tim" onclick="showMenu('tim')"><b>TIM LAVASH</b></div>
            <div class="card" id="card-milliy" onclick="showMenu('milliy')"><b>MILLIY TAOMLAR</b></div>
            <div class="card" id="card-dorxona" onclick="sendCallRequest('DORXONA')"><b>DORXONA</b></div>
            <div class="card" id="card-market" onclick="sendCallRequest('KUCHLIK MARKET')"><b>KUCHLIK MARKET</b></div>
        </div>
    </div>

    <div id="menu-page" class="menu-page">
        <button onclick="goBack()" style="width:100%; padding:10px; border-radius:10px; border:none; background:#eee; margin-bottom:10px;">🔙 Orqaga</button>
        <div id="menu-content"></div>
    </div>

    <div class="footer" id="footer">
        <button class="order-confirm" id="order-btn" onclick="finishOrder()">TASDIQLASH</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let total = 0;

        const data = {
            'burger': [
                {c: 'LAVASH', n: 'Lavash Big', p: 40000},
                {c: 'LAVASH', n: 'Lavash Mini', p: 35000},
                {c: 'LAVASH', n: 'Lavash Pishloqli', p: 45000},
                {c: 'LAVASH', n: 'Super Lavash', p: 55000},
                {c: 'BURGER', n: 'Big Burger', p: 45000},
                {c: 'BURGER', n: 'Gamburger', p: 40000},
                {c: 'BURGER', n: 'Chizburger', p: 45000},
                {c: 'BURGER', n: 'Chizburger Mini', p: 40000},
                {c: 'BURGER', n: 'Chikinzinger', p: 40000},
                {c: 'HOT-DOG', n: 'Hot-Dog Big', p: 22000},
                {c: 'HOT-DOG', n: 'Hot-Dog Mini', p: 18000},
                {c: 'HOT-DOG', n: 'Hot-Dog Qazi', p: 42000},
                {c: 'HOT-DOG', n: 'Hot-Dog Assorti', p: 33000},
                {c: 'ZAKUSKI', n: 'Klab Sendvich', p: 42000},
                {c: 'ZAKUSKI', n: 'Haggi Big', p: 40000},
                {c: 'ZAKUSKI', n: 'Haggi Mini', p: 35000},
                {c: 'ZAKUSKI', n: 'Donar Box', p: 56000},
                {c: 'ZAKUSKI', n: 'Strips (7 ta)', p: 34000},
                {c: 'ZAKUSKI', n: 'Strips (150gr)', p: 26000},
                {c: 'ZAKUSKI', n: 'Naggets (8 ta)', p: 23000},
                {c: 'ZAKUSKI', n: 'Kartoshka Fri Big', p: 24000},
                {c: 'ZAKUSKI', n: 'Kartoshka Fri Mini', p: 16000},
                {c: 'ICHIMLIK', n: 'Coca-Cola 1.5L', p: 15000},
                {c: 'ICHIMLIK', n: 'Pepsi 1.5L', p: 15000},
                {c: 'ICHIMLIK', n: 'Pepsi 0.5L', p: 8000},
                {c: 'ICHIMLIK', n: 'Sok 1L', p: 14000},
                {c: 'ICHIMLIK', n: 'Kofe / Choy', p: 8000},
                {c: 'SOUS', n: 'Sous / Mayonez', p: 3000}
            ],
            'guna': [
                {c: 'PIRASHKI', n: 'Guma (go\'shtli)', p: 5000},
                {c: 'PIRASHKI', n: 'Kartoshkali', p: 4000},
                {c: 'PIRASHKI', n: 'Cheburek', p: 10000}
            ],
            'grill': [
                {c: 'GRILL', n: 'Butun Grill', p: 70000},
                {c: 'GRILL', n: 'Yarim Grill', p: 38000}
            ],
            'somsa': [
                {c: 'SOMSA', n: 'Akaxon Somsa', p: 8000},
                {c: 'SHASHLIK', n: 'Qiyma shashlik', p: 15000},
                {c: 'SHASHLIK', n: 'Jigar shashlik', p: 13000}
            ],
            'tim': [
                {c: 'LAVASH', n: 'Tim Lavash Big', p: 38000},
                {c: 'LAVASH', n: 'Tim Lavash Mini', p: 30000}
            ],
            'milliy': [
                {c: 'TAOMLAR', n: 'Osh (1 portsiya)', p: 35000},
                {c: 'TAOMLAR', n: 'Manti (1 ta)', p: 6000},
                {c: 'TAOMLAR', n: 'Shurva', p: 22000}
            ]
        };

        function showMenu(id) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            let html = `<h2 style="text-align:center; color:#333;">${id.replace('burger','BURGER PRO').toUpperCase()}</h2>`;
            let currentCat = "";
            data[id].forEach(item => {
                if (item.c !== currentCat) {
                    html += `<div class="cat-header">${item.c}</div>`;
                    currentCat = item.c;
                }
                html += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;">
                        <div><b>${item.n}</b><br><small>${item.p.toLocaleString()} so'm</small></div>
                        <button onclick="add('${item.n}', ${item.p})" style="background:#ffc107; border:none; padding:8px 18px; border-radius:8px; font-weight:bold;">+</button>
                    </div>`;
            });
            document.getElementById('menu-content').innerHTML = html;
        }

        function add(n, p) {
            cart.push({name: n, price: p});
            total += p;
            document.getElementById('footer').style.display = 'block';
            document.getElementById('order-btn').innerText = `TASDIQLASH: ${total.toLocaleString()} so'm`;
        }

        function goBack() {
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            cart = []; total = 0;
        }

        function finishOrder() {
            if (cart.length > 0) { tg.sendData(JSON.stringify(cart)); tg.close(); }
        }

        function sendCallRequest(target) {
            tg.sendData(JSON.stringify({action: "call", target: target}));
            tg.close();
        }
    </script>
</body>
</html>
